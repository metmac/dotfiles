# tmux.conf
# Michael Metcalf, 2016
# Inspired by Ham Vocke, Brandon Freitag
# http://www.hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/
# https://robots.thoughtbot.com/how-to-copy-and-paste-with-tmux-on-mac-os-x
# set-option -g default-command "reattach-to-user-namespace -l bash"

# truecolor so hex colors render correctly inside tmux
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# --- status bar (subtle: transparent bg, muted text, one blue accent) --------
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=#8b93b3"

# left: just the session name
set -g status-left "#[fg=#769ff0,bold] #S #[default]"
set -g status-left-length 30

# window list: inactive dim, active blue
setw -g window-status-format "#[fg=#6c7086] #I #W "
setw -g window-status-current-format "#[fg=#769ff0,bold] #I #W "
setw -g window-status-separator ""

# right: Claude Code status (global approvals + focused pane's model/ctx/$/branch)
# via cc-tmux.sh, then hostname + clock.
set -g status-right "#(~/.claude/cc-tmux.sh #{pane_id})  #[fg=#6c7086]#H  #[fg=#c8d3f5]%H:%M "
set -g status-right-length 150

# panes, modes, messages — thin blue accents, no loud blocks
set -g pane-active-border-style "fg=#769ff0"
set -g pane-border-style "fg=#33384a"
set -wg mode-style "bg=#394260,fg=#e3e5e5"
set -g message-style "fg=#769ff0"


# remap C-b to C-s
unbind C-b
set-option -g prefix M-s
bind-key M-s send-prefix

# split panes with - and =
unbind '"'
unbind %
unbind -
unbind =
# open the new pane in the current pane's working directory
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# closing windows and panes
unbind .
unbind &
bind -T prefix / confirm-before -p "kill-window #W? (y/n)" kill-window
bind -T prefix . confirm-before -p "kill-pane #P? (y/n)" kill-pane

# remapping for new, last and next windows
unbind n
unbind m
bind -T prefix m next-window
bind -T prefix n new-window

# reload tmux.conf
bind r source-file ~/.tmux.conf
# bind e new-window -n '~/.tmux.conf' "sh -c 'nvim ~/.tmux.conf && tmux source ~/.tmux.conf'"
bind e run-shell "sh -c 'code --wait ~/.tmux.conf && tmux source ~/.tmux.conf'"


# switch panes with { }

#bind -n M-S-[ last-pane
#bind -n M-S-] select-pane -t :.+

# switch panes with alt-arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# prefix + arrows also move between panes
bind -T prefix Left select-pane -L
bind -T prefix Right select-pane -R
bind -T prefix Up select-pane -U
bind -T prefix Down select-pane -D

# switch panes with option+qwer (LoL nod): q<-  w^  e_v  r->
bind -n M-q select-pane -L
bind -n M-w select-pane -U
bind -n M-e select-pane -D
bind -n M-r select-pane -R

# switch windows with option+[ and option+]
bind -n M-[ previous-window
bind -n M-] next-window

# enable mouse control
set -g mouse on


# accomodate vim keybindings
unbind C-Left
unbind C-Right
unbind C-Up
unbind C-Down
set-window-option -g xterm-keys on

# allow vim to exit modes quickly. 10ms (not 0) so Alt+[ / Alt+] can be told
# apart from arrow-key escape sequences (ESC[…) without breaking the arrows.
set escape-time 10
